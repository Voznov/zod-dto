name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance (OIDC-signed Sigstore attestation that links
      # the published package to this repo + workflow run).
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # pnpm doesn't support npm's OIDC trusted publishing yet (pnpm#10075).
      # We pack with pnpm (for `workspace:^` → real version substitution) and
      # publish with npm. OIDC trusted publishing in npm CLI needs >= 11.5.
      - run: npm install --global npm@latest

      - run: pnpm install --frozen-lockfile

      # Guard: the tag (v0.2.0) must match both package.json versions. Prevents
      # "I tagged but forgot to bump" / "bumped only one package" mistakes.
      - name: Verify tag matches package versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          NESTJS_VERSION=$(node -p "require('./packages/nestjs/package.json').version")
          echo "tag=$TAG_VERSION core=$CORE_VERSION nestjs=$NESTJS_VERSION"
          if [ "$TAG_VERSION" != "$CORE_VERSION" ] || [ "$TAG_VERSION" != "$NESTJS_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match both package versions"
            exit 1
          fi

      - run: pnpm build
      - run: pnpm check:all

      # Publish each package: pnpm pack writes a tarball with `workspace:^` rewritten
      # to the real version; npm publish uploads it using its OIDC flow (the
      # `id-token: write` permission above is what makes the OIDC token available).
      - name: Publish @voznov/zod-dto
        working-directory: packages/core
        run: |
          pnpm pack
          npm publish --provenance *.tgz

      - name: Publish @voznov/zod-dto-nestjs
        working-directory: packages/nestjs
        run: |
          pnpm pack
          npm publish --provenance *.tgz
